<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skullbriar">
<meta name="theme-color" content="#0b0f0a">
<title>Skullbriar — Compteurs</title>
<style>
  :root{
    --bg:#0b0f0a; --bg2:#11160f; --card:#161d13; --card2:#1d2618; --card3:#212c1a;
    --line:#2c3a25; --line2:#384b2e; --txt:#e8f0e2; --dim:#8aa07d; --dim2:#647a57;
    --green:#5fa83b; --green2:#7cc94f; --greenGlow:rgba(124,201,79,.5);
    --purple:#7d4fa3; --purpleBg:#241a2c; --gold:#d4af37; --goldDim:#b59a3a;
    --red:#d8584f; --redGlow:rgba(216,88,79,.4); --blue:#5b9bd5;
    --shadow:0 6px 22px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;}
  html,body{margin:0; min-height:100%; background:radial-gradient(120% 80% at 50% 0%, #12180f 0%, #0b0f0a 55%, #0a0c0c 100%);
    color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overscroll-behavior:none;}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 24px) env(safe-area-inset-left);}
  .wrap{max-width:600px; margin:0 auto; padding:10px 14px 0;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  .noselect{user-select:none; -webkit-user-select:none;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:4px 2px 6px;}
  .brand{display:flex; align-items:center; gap:9px; min-width:0;}
  .brand .skull{font-size:24px;}
  .brand h1{font-size:17px; margin:0; font-weight:800; letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .brand .sub{font-size:11px; color:var(--dim); margin-top:1px;}
  .topbtns{display:flex; gap:7px; flex-shrink:0;}
  .iconbtn{width:42px; height:42px; border-radius:12px; background:var(--card2); border:1px solid var(--line);
    color:var(--dim); font-size:17px; display:flex; align-items:center; justify-content:center; transition:transform .07s,background .15s;}
  .iconbtn:active{transform:scale(.9); background:var(--card3);}
  .iconbtn.disabled{opacity:.35;}
  .iconbtn.wide{width:auto; padding:0 13px; gap:5px; font-size:14px; font-weight:800;}
  .iconbtn .bl{font-size:13px; font-weight:800; letter-spacing:.2px;}
  .iconbtn.danger{color:var(--red); border-color:#5a2e2b; background:#1f1311;}
  .iconbtn.danger:active{background:#2a1413;}

  /* ---------- Creature tabs ---------- */
  .tabs{display:flex; gap:7px; overflow-x:auto; padding:2px 2px 8px; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex-shrink:0; padding:9px 14px; border-radius:12px; background:var(--card); border:1px solid var(--line);
    color:var(--dim); font-size:13px; font-weight:700; white-space:nowrap; display:flex; align-items:center; gap:7px;}
  .tab.active{background:linear-gradient(135deg,#1c2a13,#243617); border-color:var(--green); color:var(--green2); box-shadow:0 0 0 1px var(--green) inset;}
  .tab .ptmini{font-size:11px; color:var(--dim2); font-weight:600;}
  .tab.active .ptmini{color:var(--green2);}
  .tab.add{color:var(--green2); border-style:dashed;}

  /* ---------- HERO ---------- */
  .hero{position:relative; overflow:hidden; background:linear-gradient(140deg,var(--card),var(--card2));
    border:1px solid var(--line); border-radius:20px; padding:11px 14px 12px; box-shadow:var(--shadow); margin-bottom:10px;}
  .hero::after{content:""; position:absolute; inset:0; background:radial-gradient(circle at 50% -10%, rgba(124,201,79,.14), transparent 60%); pointer-events:none;}
  /* bannière artwork du commandant */
  .heroart{position:relative; height:74px; margin:-11px -14px 9px; overflow:hidden; border-radius:19px 19px 0 0;
    background-size:cover; background-position:center 30%;}
  .heroart::after{content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(11,15,10,.05) 0%, rgba(11,15,10,.35) 55%, var(--card2) 100%);}
  .heroart .zoom{position:absolute; top:10px; right:10px; z-index:2; width:38px; height:38px; border-radius:11px;
    background:rgba(8,12,7,.55); border:1px solid rgba(255,255,255,.18); color:#fff; font-size:16px;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(2px);}
  .heroart .zoom:active{transform:scale(.9);}
  .hero.hasart .crname{margin-top:-4px;}

  /* vue plein écran de la carte */
  .cardview{position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center;
    z-index:300; padding:24px; flex-direction:column; gap:14px;}
  .cardview.show{display:flex; animation:fadein .18s ease;}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}
  .cardview img{max-width:100%; max-height:78vh; border-radius:18px; box-shadow:0 12px 50px rgba(0,0,0,.7);}
  .cardview .close{padding:12px 26px; border-radius:14px; background:var(--card2); border:1px solid var(--line2); color:var(--txt); font-size:15px; font-weight:700;}

  .hero .crname{text-align:center; font-size:12px; color:var(--dim); font-weight:700; letter-spacing:.4px; margin-bottom:1px;}
  .hero .crname .edit{font-size:11px; color:var(--dim2); margin-left:5px;}
  .pt{display:flex; align-items:center; justify-content:center; gap:0; font-weight:800; line-height:1; font-variant-numeric:tabular-nums; letter-spacing:-2px;}
  .pt .num{font-size:46px; min-width:42px; text-align:center; transition:color .2s;}
  .pt .num.buffed{color:var(--green2); text-shadow:0 0 22px var(--greenGlow);}
  .pt .num.debuffed{color:var(--red);}
  .pt .slash{font-size:32px; color:var(--dim2); font-weight:300; margin:0 4px; letter-spacing:0;}
  .pt-lbl{text-align:center; font-size:9px; color:var(--dim); margin-top:2px; text-transform:uppercase; letter-spacing:2px;}
  .basenote{text-align:center; font-size:10.5px; color:var(--dim2); margin-top:3px;}
  .basenote b{color:var(--dim);}
  .badges{display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:8px; position:relative;}
  .badge{font-size:10.5px; font-weight:700; padding:4px 8px; border-radius:8px; background:var(--card3); border:1px solid var(--line2); color:var(--dim); display:flex; align-items:center; gap:4px;}
  .badge.dmg{color:var(--green2); border-color:var(--green);}
  .badge.life{color:var(--red); border-color:#5a2e2b;}
  .badge.death{color:#c98bd6; border-color:#4a3550;}

  /* big +1/+1 control */
  .p1p1{position:relative; display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:9px;
    background:rgba(124,201,79,.07); border:1px solid var(--line2); border-radius:14px; padding:8px 10px;}
  .p1p1 .lbl{font-size:14px; font-weight:800; color:var(--green2);}
  .p1p1 .lbl small{display:block; font-size:10px; font-weight:600; color:var(--dim); letter-spacing:.3px;}
  .stepper{display:flex; align-items:center; gap:0; flex-shrink:0;}
  .sbtn{width:52px; height:52px; border-radius:14px; border:1px solid var(--line2); background:var(--card3);
    font-size:28px; font-weight:700; display:flex; align-items:center; justify-content:center; transition:transform .06s,background .12s; touch-action:manipulation;}
  .sbtn:active{transform:scale(.88); background:#2c3a20;}
  .sbtn.minus{color:var(--red);} .sbtn.plus{color:var(--green2);}
  .sval{min-width:50px; text-align:center; font-size:30px; font-weight:800; font-variant-numeric:tabular-nums;}
  .p1p1 .sbtn{width:50px;height:50px;font-size:28px;} .p1p1 .sval{font-size:30px;min-width:48px;}

  /* ---------- sections ---------- */
  .sec-title{display:flex; align-items:center; justify-content:space-between; margin:14px 4px 8px; font-size:11px;
    color:var(--dim); text-transform:uppercase; letter-spacing:2px; font-weight:800;}
  .sec-title .right{display:flex; gap:8px; align-items:center;}
  .pill{font-size:11px; font-weight:800; padding:5px 10px; border-radius:9px; letter-spacing:.3px; text-transform:none;}
  .pill.green{background:rgba(124,201,79,.14); color:var(--green2); border:1px solid var(--line2);}
  .pill.brawler{background:rgba(125,79,163,.18); color:#c98bd6; border:1px solid #4a3550;}
  .pill.act:active{transform:scale(.93);}

  /* active counters — 2 colonnes compactes */
  .actlist{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:7px;}
  .actrow{display:flex; align-items:center; justify-content:space-between; gap:6px; padding:6px 6px 6px 10px;
    background:linear-gradient(135deg,#16210f,#1a2812); border:1px solid var(--green); border-radius:13px; min-width:0;}
  .actrow.minus11{background:linear-gradient(135deg,#241312,#2a1716); border-color:#6e342f;}
  .actrow .lab{display:flex; align-items:center; gap:6px; min-width:0; flex:1;}
  .actrow .emoji{font-size:16px; flex-shrink:0;} .actrow .nm{font-size:12.5px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .actrow .stepper{flex-shrink:0;}
  .actrow .stepper .sbtn{width:36px; height:36px; font-size:19px; border-radius:10px;}
  .actrow .stepper .sval{min-width:24px; font-size:17px;}
  .actrow.wide{grid-column:span 2;}
  .empty{grid-column:span 2; padding:14px; text-align:center; color:var(--dim2); font-size:13px; background:var(--card); border:1px dashed var(--line); border-radius:15px;}

  /* palette */
  .palette{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
  .pchip{display:flex; align-items:center; gap:8px; padding:11px 12px; background:var(--card); border:1px solid var(--line);
    border-radius:13px; font-size:13.5px; font-weight:600; color:var(--txt); transition:transform .06s,background .12s,border-color .12s; text-align:left;}
  .pchip:active{transform:scale(.95); background:var(--card3); border-color:var(--green);}
  .pchip .emoji{font-size:16px; flex-shrink:0;}
  .pchip .nm{flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pchip .plus{color:var(--green2); font-size:18px; font-weight:800;}
  .pchip.custom .nm{color:var(--gold);}
  .pchip.addnew{border-style:dashed; color:var(--green2); justify-content:center; grid-column:span 2;}

  /* ---------- Commander tax ---------- */
  .tax{background:linear-gradient(135deg,#1a1320,var(--purpleBg)); border:1px solid #3a2b3f; border-radius:18px; padding:14px; margin-bottom:4px;}
  .tax .head{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .tax .tt{font-size:14px; font-weight:800; color:#ecd9f5;}
  .tax .td{font-size:11px; color:#b59ec2; margin-top:2px;}
  .tax .taxbig{font-size:34px; font-weight:800; color:var(--gold); font-variant-numeric:tabular-nums; line-height:1;}
  .tax .taxbig small{font-size:13px; color:var(--goldDim); font-weight:700;}
  .tax .row{display:flex; align-items:center; justify-content:space-between;}
  .tax .row .lab{font-size:13px; color:#cdb8d6; font-weight:600;}
  .tax .sbtn{border-color:#43344a; background:#2a1f30;} .tax .sbtn:active{background:#372842;}
  .tax .sbtn.plus{color:#d9b6ec;} .tax .sbtn.minus{color:#c98a8a;}

  /* ---------- Commander damage ---------- */
  .opp{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:12px 12px 10px; margin-bottom:8px;}
  .opp.lethal{border-color:var(--red); background:linear-gradient(135deg,#241312,#1a1010); box-shadow:0 0 0 1px var(--red) inset;}
  .opp .top{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:9px;}
  .opp .name{font-size:14px; font-weight:700; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .opp .name .edit{color:var(--dim2); font-size:11px; margin-left:5px;}
  .opp .dmgval{font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; min-width:62px; text-align:center;}
  .opp .dmgval .of{font-size:12px; color:var(--dim2); font-weight:600;}
  .opp.lethal .dmgval{color:var(--red);}
  .opp .bar{height:7px; border-radius:6px; background:var(--bg2); overflow:hidden; margin-bottom:9px; border:1px solid var(--line);}
  .opp .bar > i{display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--green2)); transition:width .25s;}
  .opp.lethal .bar > i{background:linear-gradient(90deg,#a33,#d8584f);}
  .opp .ctrls{display:flex; align-items:center; gap:8px;}
  .opp .ctrls .stepper{flex:1; justify-content:space-between;}
  .opp .ctrls .sbtn{width:46px; height:42px; font-size:22px;}
  .opp .combatbtn{flex-shrink:0; padding:0 12px; height:42px; border-radius:12px; background:rgba(124,201,79,.12);
    border:1px solid var(--line2); color:var(--green2); font-size:12px; font-weight:800; display:flex; align-items:center; gap:5px;}
  .opp .combatbtn:active{transform:scale(.94); background:rgba(124,201,79,.2);}
  .opp .del{color:var(--dim2); font-size:15px; padding:4px 6px;}
  .lethal-tag{font-size:10px; font-weight:800; color:var(--red); border:1px solid var(--red); border-radius:7px; padding:2px 6px; letter-spacing:.5px;}
  .addopp{width:100%; padding:13px; border-radius:14px; background:var(--card2); border:1px dashed var(--line);
    color:var(--blue); font-size:13px; font-weight:700; margin-top:2px;}

  .footer{text-align:center; color:var(--dim2); font-size:11px; padding:22px 12px 6px; line-height:1.6;}
  .footer b{color:var(--dim);}

  /* ---------- modal ---------- */
  .modal{position:fixed; inset:0; background:rgba(0,0,0,.66); backdrop-filter:blur(3px); display:none; align-items:flex-end; justify-content:center; z-index:100;}
  .modal.show{display:flex;}
  .sheet{background:linear-gradient(180deg,var(--card2),var(--card)); border:1px solid var(--line2); border-bottom:none;
    border-radius:22px 22px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom)); width:100%; max-width:600px;
    box-shadow:0 -10px 40px rgba(0,0,0,.6); animation:slideup .22s ease;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet h3{margin:0 0 4px; font-size:17px;} .sheet p{margin:0 0 16px; font-size:12px; color:var(--dim);}
  .sheet .grip{width:38px; height:4px; border-radius:3px; background:var(--line2); margin:0 auto 16px;}
  .field{margin-bottom:14px;} .field label{display:block; font-size:11px; color:var(--dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; font-weight:700;}
  .field input{width:100%; padding:14px; border-radius:13px; border:1px solid var(--line2); background:var(--bg2); color:var(--txt); font-size:16px;}
  .field .pair{display:flex; gap:10px;} .field .pair input{text-align:center;}
  .emojipick{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
  .emojipick button{width:42px; height:42px; border-radius:11px; background:var(--card3); border:1px solid var(--line); font-size:19px;}
  .emojipick button.sel{border-color:var(--green); background:rgba(124,201,79,.15);}
  .acts{display:flex; gap:10px; margin-top:6px;}
  .acts button{flex:1; padding:15px; border-radius:14px; font-size:15px; font-weight:800; border:1px solid var(--line2);}
  .acts .ok{background:var(--green); color:#07140a; border-color:var(--green);} .acts .ok:active{background:var(--green2);}
  .acts .cancel{background:var(--card3); color:var(--dim);}
  .acts .danger{background:#2a1413; color:var(--red); border-color:#5a2e2b;}
  .menu-item{display:flex; align-items:center; gap:12px; padding:15px 4px; font-size:15px; font-weight:600; border-bottom:1px solid var(--line);}
  .menu-item:last-child{border-bottom:none;} .menu-item .mi-ico{font-size:19px; width:24px; text-align:center;}
  .menu-item.danger{color:var(--red);}
  .toast{position:fixed; left:50%; bottom:calc(28px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px);
    background:var(--card3); border:1px solid var(--line2); color:var(--txt); padding:11px 18px; border-radius:13px; font-size:13px;
    font-weight:600; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; z-index:200; max-width:90%;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap noselect">
  <div class="topbar">
    <div class="brand">
      <span class="skull">💀</span>
      <div>
        <h1>Skullbriar</h1>
        <div class="sub">Compteurs &amp; dégâts de commandant</div>
      </div>
    </div>
    <div class="topbtns">
      <button class="iconbtn wide" id="undoBtn" data-act="undo" title="Annuler">↺<span class="bl">Annuler</span></button>
      <button class="iconbtn wide danger" data-act="resetAll" title="Tout réinitialiser">⟳<span class="bl">Reset</span></button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="hero" id="hero"></div>

  <div class="sec-title">
    <span>Compteurs sur la carte</span>
    <div class="right">
      <button class="pill green act" data-act="proliferate" id="prolifBtn">✦ Proliférer</button>
      <button class="pill brawler act" data-act="brawler" id="brawlerBtn" title="+4 +1/+1, Vol, Vigilance, Piétinement, Lien de vie">🥊 Brawler</button>
    </div>
  </div>
  <div class="actlist" id="actlist"></div>

  <div class="sec-title"><span>Ajouter un compteur</span></div>
  <div class="palette" id="palette"></div>

  <div class="sec-title"><span>Taxe de commandement</span></div>
  <div class="tax" id="tax"></div>

  <div class="sec-title">
    <span>Dégâts de commandant <span style="color:var(--dim2)">· 21 = létal</span></span>
  </div>
  <div id="opps"></div>
  <button class="addopp" data-act="addOpp">＋ Ajouter un adversaire</button>

  <div class="footer">
    Sauvegarde automatique sur l'appareil.<br>
    <b>Astuce :</b> Partager ⬆️ → « Sur l'écran d'accueil » pour le plein écran.
  </div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="cardview" id="cardview"><img id="cardviewImg" alt="Skullbriar, the Walking Grave"><button class="close" data-act="closeCard">Fermer</button></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   Skullbriar Counter Tracker — v2
   ============================================================ */

// Définition des types de compteurs intégrés
const KEYWORDS = [
  {id:'deathtouch',    n:'Deathtouch',     e:'☠️'},
  {id:'doublestrike',  n:'Double Strike',  e:'⚔️'},
  {id:'firststrike',   n:'First Strike',   e:'🗡️'},
  {id:'flying',        n:'Flying',         e:'🪶'},
  {id:'haste',         n:'Haste',          e:'⚡'},
  {id:'hexproof',      n:'Hexproof',       e:'🌀'},
  {id:'indestructible',n:'Indestructible', e:'💎'},
  {id:'lifelink',      n:'Lifelink',       e:'❤️'},
  {id:'menace',        n:'Menace',         e:'😈'},
  {id:'reach',         n:'Reach',          e:'🏹'},
  {id:'shield',        n:'Shield',         e:'🔰'},
  {id:'trample',       n:'Trample',        e:'🐘'},
  {id:'vigilance',     n:'Vigilance',      e:'👁️'},
  {id:'goaded',        n:'Goaded',         e:'🔥'},
  {id:'prepared',      n:'Prepared',       e:'🎯'},
];
const EMOJI_CHOICES = ['✨','🟢','🔵','🟣','🟡','🔴','⚫','🧪','💀','🐍','🌿','⭐','🛡️','⚔️','💧','🔆'];

let state = null;
let history = [];

/* ---------- persistence ---------- */
function defaultState(){
  return {
    v:2,
    creatures:[ newCreature('Skullbriar', 1, 1, true) ],
    activeId:null,
    casts:0,
    opponents:[ newOpp('Adversaire 1'), newOpp('Adversaire 2'), newOpp('Adversaire 3') ],
    customTypes:[],
    seq:1
  };
}
// Générateur d'identifiant unique : compteur monotone (+ horodatage) => jamais de
// doublon, même pour plusieurs créations dans la même milliseconde.
// Corrige le bug des dégâts de commandant (adversaires 2/3 partageaient l'id du 1).
let _uidSeq = 0;
function uid(prefix){ return prefix + Date.now().toString(36) + '_' + (_uidSeq++).toString(36); }
function newCreature(name, p, t, isCmd){
  return { id:uid('c'), name, baseP:p, baseT:t, cmd:!!isCmd, counts:{} };
}
function newOpp(name){ return { id:uid('o'), name, dmg:0 }; }

// Migration : d'anciennes sauvegardes peuvent contenir des ids dupliqués
// (adversaires créés dans la même milliseconde). On ré-attribue tout doublon.
function ensureUniqueIds(s){
  const seen = new Set();
  const fix = (arr, prefix) => {
    if(!Array.isArray(arr)) return;
    arr.forEach(o=>{
      if(!o || !o.id || seen.has(o.id)) o.id = uid(prefix);
      seen.add(o.id);
    });
  };
  fix(s.creatures, 'c');
  fix(s.opponents, 'o');
}
function load(){
  try{ const s = JSON.parse(localStorage.getItem(KEY)); if(s && s.creatures){ ensureUniqueIds(s); return s; } }catch(e){}
  return defaultState();
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

function snapshot(){
  history.push(JSON.stringify(state));
  if(history.length>50) history.shift();
}
function undo(){
  if(!history.length){ toast('Rien à annuler'); return; }
  state = JSON.parse(history.pop());
  save(); render(); toast('Annulé');
}

/* ---------- helpers ---------- */
function active(){
  let c = state.creatures.find(x=>x.id===state.activeId);
  if(!c){ c = state.creatures[0]; state.activeId = c.id; }
  return c;
}
function allTypes(){
  return [
    {id:'p1p1', n:'+1/+1', e:'💪', kind:'plus'},
    {id:'m1m1', n:'−1/−1', e:'🩸', kind:'minus'},
    ...KEYWORDS.map(k=>({...k, kind:'kw'})),
    ...state.customTypes.map(k=>({...k, kind:'custom'})),
  ];
}
function typeDef(id){ return allTypes().find(t=>t.id===id) || {id, n:id, e:'✨', kind:'custom'}; }
function getN(c,id){ return c.counts[id]||0; }
function setN(c,id,v){ v=Math.max(0,v|0); if(v===0) delete c.counts[id]; else c.counts[id]=v; }
function annihilate(c){
  const m = Math.min(getN(c,'p1p1'), getN(c,'m1m1'));
  if(m>0){ setN(c,'p1p1',getN(c,'p1p1')-m); setN(c,'m1m1',getN(c,'m1m1')-m); }
}
function power(c){ return c.baseP + getN(c,'p1p1') - getN(c,'m1m1'); }
function tough(c){ return c.baseT + getN(c,'p1p1') - getN(c,'m1m1'); }
function combatDamage(c){
  let p = Math.max(0, power(c));
  if(getN(c,'doublestrike')>0) p *= 2;
  return p;
}

/* ---------- mutations ---------- */
function bump(id, d){
  snapshot();
  const c = active();
  setN(c, id, getN(c,id)+d);
  if(id==='p1p1'||id==='m1m1') annihilate(c);
  save(); render();
}
function setCount(id){
  const c = active();
  const cur = getN(c,id);
  const v = prompt(typeDef(id).n + ' — nombre de compteurs :', cur);
  if(v===null) return;
  const n = parseInt(v,10);
  if(isNaN(n)) return;
  snapshot(); setN(c,id,n); if(id==='p1p1'||id==='m1m1') annihilate(c); save(); render();
}
function proliferate(){
  const c = active();
  const ids = Object.keys(c.counts).filter(k=>c.counts[k]>0);
  if(!ids.length){ toast('Aucun compteur à proliférer'); return; }
  snapshot();
  ids.forEach(k=> c.counts[k]+=1);
  annihilate(c);
  save(); render(); toast('Proliféré : +1 sur '+ids.length+' type(s)');
}
// Préréglage « Brawler » : +4 compteurs +1/+1 et accorde Vol, Vigilance,
// Piétinement et Lien de vie (ajout d'1 compteur sur le mot-clé s'il est absent).
function brawler(){
  const c = active();
  snapshot();
  setN(c,'p1p1', getN(c,'p1p1')+4);
  ['flying','vigilance','trample','lifelink'].forEach(id=>{ if(getN(c,id)<1) setN(c,id,1); });
  annihilate(c);
  save(); render();
  toast('Brawler : +4 +1/+1 · Vol · Vigilance · Piétinement · Lien de vie');
}
function cmdDmg(oid, d){
  snapshot();
  const o = state.opponents.find(x=>x.id===oid); if(!o) return;
  o.dmg = Math.max(0, o.dmg+d); save(); render();
}
function cmdDmgCombat(oid){
  const dmg = combatDamage(active());
  if(dmg<=0){ toast('0 dégât de combat'); return; }
  snapshot();
  const o = state.opponents.find(x=>x.id===oid); if(!o) return;
  o.dmg += dmg; save(); render();
  toast('+'+dmg+' dégât(s) → '+o.name);
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  renderTabs(); renderHero(); renderActive(); renderPalette(); renderTax(); renderOpps();
  document.getElementById('undoBtn').classList.toggle('disabled', history.length===0);
}

function renderTabs(){
  const el = document.getElementById('tabs'); el.innerHTML='';
  state.creatures.forEach(c=>{
    const b = document.createElement('button');
    b.className='tab'+(c.id===state.activeId?' active':'');
    b.dataset.act='switch'; b.dataset.id=c.id;
    b.innerHTML = `${c.cmd?'👑 ':''}${esc(c.name)} <span class="ptmini">${power(c)}/${tough(c)}</span>`;
    el.appendChild(b);
  });
  const add = document.createElement('button');
  add.className='tab add'; add.dataset.act='addCreature'; add.textContent='＋';
  el.appendChild(add);
}

function renderHero(){
  const c = active();
  const p=power(c), t=tough(c), bp=c.baseP, bt=c.baseT;
  const p11=getN(c,'p1p1'), m11=getN(c,'m1m1');
  const cls = p11>m11 ? 'buffed' : (m11>p11 ? 'debuffed' : '');

  const badges=[];
  const dmg = combatDamage(c);
  const ds = getN(c,'doublestrike')>0;
  badges.push(`<span class="badge dmg">⚔️ ${dmg} dégâts${ds?' <small>(double)</small>':''}</span>`);
  if(getN(c,'lifelink')>0) badges.push(`<span class="badge life">❤️ +${dmg} vie</span>`);
  if(getN(c,'deathtouch')>0) badges.push(`<span class="badge death">☠️ létal au contact</span>`);
  if(getN(c,'firststrike')>0 && !ds) badges.push(`<span class="badge">🗡️ initiative</span>`);
  if(getN(c,'trample')>0) badges.push(`<span class="badge">🐘 piétinement</span>`);
  if(getN(c,'flying')>0) badges.push(`<span class="badge">🪶 vol</span>`);
  if(getN(c,'indestructible')>0) badges.push(`<span class="badge">💎 indestructible</span>`);

  const showArt = c.cmd && HAS_ART;
  const heroEl = document.getElementById('hero');
  heroEl.classList.toggle('hasart', showArt);
  heroEl.innerHTML = `
    ${showArt?`<div class="heroart" style="background-image:url('${CARD_ART}')"><button class="zoom" data-act="viewCard">🔍</button></div>`:''}
    <div class="crname">${c.cmd?'👑 ':''}${esc(c.name)} <span class="edit" data-act="editCreature">✎ base ${bp}/${bt}</span></div>
    <div class="pt">
      <span class="num ${cls}">${p}</span><span class="slash">/</span><span class="num ${cls}">${t}</span>
    </div>
    <div class="pt-lbl">Force / Endurance</div>
    <div class="basenote">base <b>${bp}/${bt}</b> ${p11?`<b>+${p11}</b> compteur(s) +1/+1`:''}${m11?` <b>−${m11}</b> compteur(s) −1/−1`:''}${(!p11&&!m11)?'· aucun compteur +1/+1':''}</div>
    <div class="badges">${badges.join('')}</div>
    <div class="p1p1">
      <div class="lbl">＋1/＋1 <small>tape le nombre pour saisir</small></div>
      <div class="stepper">
        <button class="sbtn minus" data-act="bump" data-id="p1p1" data-d="-1">−</button>
        <div class="sval" data-act="set" data-id="p1p1">${p11}</div>
        <button class="sbtn plus" data-act="bump" data-id="p1p1" data-d="1">＋</button>
      </div>
    </div>`;
}

function renderActive(){
  const c = active();
  const el = document.getElementById('actlist'); el.innerHTML='';
  // tous les types actifs sauf p1p1 (déjà dans le hero)
  const types = allTypes().filter(t=> t.id!=='p1p1' && getN(c,t.id)>0);
  if(!types.length){
    el.innerHTML = `<div class="empty">Aucun autre compteur. Ajoute-en ci-dessous 👇</div>`;
    document.getElementById('prolifBtn').style.opacity = getN(c,'p1p1')>0 ? '1':'.4';
    return;
  }
  document.getElementById('prolifBtn').style.opacity='1';
  // ordre : m1m1 puis le reste par valeur décroissante
  types.sort((a,b)=> (a.id==='m1m1'?-1:b.id==='m1m1'?1: getN(c,b.id)-getN(c,a.id)));
  types.forEach(t=>{
    const v=getN(c,t.id);
    const row=document.createElement('div');
    row.className='actrow'+(t.id==='m1m1'?' minus11':'');
    row.innerHTML=`
      <div class="lab"><span class="emoji">${t.e}</span><span class="nm">${esc(t.n)}</span></div>
      <div class="stepper">
        <button class="sbtn minus" data-act="bump" data-id="${t.id}" data-d="-1">−</button>
        <div class="sval" data-act="set" data-id="${t.id}">${v}</div>
        <button class="sbtn plus" data-act="bump" data-id="${t.id}" data-d="1">＋</button>
      </div>`;
    el.appendChild(row);
  });
}

function renderPalette(){
  const c = active();
  const el=document.getElementById('palette'); el.innerHTML='';
  // types disponibles = ceux à 0 (sauf p1p1 dans hero)
  const types = allTypes().filter(t=> t.id!=='p1p1' && getN(c,t.id)===0);
  types.forEach(t=>{
    const b=document.createElement('button');
    b.className='pchip'+(t.kind==='custom'?' custom':'');
    b.dataset.act='add'; b.dataset.id=t.id;
    b.innerHTML=`<span class="emoji">${t.e}</span><span class="nm">${esc(t.n)}</span><span class="plus">＋</span>`;
    el.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='pchip addnew'; add.dataset.act='addType';
  add.innerHTML='＋ Compteur personnalisé';
  el.appendChild(add);
}

function renderTax(){
  const tax = state.casts*2;
  document.getElementById('tax').innerHTML=`
    <div class="head">
      <div><div class="tt">👑 Surcoût de relance</div><div class="td">${state.casts} relance(s) · +2 générique par relance</div></div>
      <div class="taxbig">+${tax}<small> générique</small></div>
    </div>
    <div class="row">
      <div class="lab">Fois lancée depuis la zone de commandement</div>
      <div class="stepper">
        <button class="sbtn minus" data-act="bumpTax" data-d="-1">−</button>
        <div class="sval" data-act="setTax">${state.casts}</div>
        <button class="sbtn plus" data-act="bumpTax" data-d="1">＋</button>
      </div>
    </div>`;
}

function renderOpps(){
  const el=document.getElementById('opps'); el.innerHTML='';
  state.opponents.forEach(o=>{
    const pct=Math.min(100, Math.round(o.dmg/21*100));
    const lethal=o.dmg>=21;
    const d=document.createElement('div');
    d.className='opp'+(lethal?' lethal':'');
    d.innerHTML=`
      <div class="top">
        <span class="name" data-act="renameOpp" data-id="${o.id}">${esc(o.name)} <span class="edit">✎</span></span>
        ${lethal?'<span class="lethal-tag">LÉTAL</span>':''}
        <span class="dmgval">${o.dmg}<span class="of"> / 21</span></span>
        <button class="del" data-act="delOpp" data-id="${o.id}">✕</button>
      </div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="ctrls">
        <div class="stepper">
          <button class="sbtn minus" data-act="cmd" data-id="${o.id}" data-d="-1">−</button>
          <div class="sval" data-act="setDmg" data-id="${o.id}">${o.dmg}</div>
          <button class="sbtn plus" data-act="cmd" data-id="${o.id}" data-d="1">＋</button>
        </div>
        <button class="combatbtn" data-act="cmdCombat" data-id="${o.id}">⚔️ +combat (${combatDamage(active())})</button>
      </div>`;
    el.appendChild(d);
  });
}

/* ============================================================
   EVENT DELEGATION (corrige le bug + / −)
   ============================================================ */
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-act]');
  if(!t) return;
  const act = t.dataset.act;
  switch(act){
    case 'bump':       bump(t.dataset.id, parseInt(t.dataset.d,10)); break;
    case 'set':        setCount(t.dataset.id); break;
    case 'add':        bump(t.dataset.id, 1); break;
    case 'proliferate':proliferate(); break;
    case 'brawler':    brawler(); break;
    case 'undo':       undo(); break;
    case 'switch':     state.activeId=t.dataset.id; save(); render(); break;
    case 'addCreature':openCreatureModal(null); break;
    case 'editCreature':openCreatureModal(active()); break;
    case 'addType':    openTypeModal(); break;
    case 'bumpTax':    snapshot(); state.casts=Math.max(0,state.casts+parseInt(t.dataset.d,10)); save(); render(); break;
    case 'setTax':   { const v=prompt('Nombre de relances :',state.casts); if(v!==null&&!isNaN(parseInt(v,10))){snapshot();state.casts=Math.max(0,parseInt(v,10));save();render();} break; }
    case 'cmd':        cmdDmg(t.dataset.id, parseInt(t.dataset.d,10)); break;
    case 'cmdCombat':  cmdDmgCombat(t.dataset.id); break;
    case 'setDmg':   { const o=state.opponents.find(x=>x.id===t.dataset.id); if(o){const v=prompt('Dégâts de commandant :',o.dmg); if(v!==null&&!isNaN(parseInt(v,10))){snapshot();o.dmg=Math.max(0,parseInt(v,10));save();render();}} break; }
    case 'renameOpp':{ const o=state.opponents.find(x=>x.id===t.dataset.id); if(o){const v=prompt('Nom de l\'adversaire :',o.name); if(v!==null&&v.trim()){snapshot();o.name=v.trim();save();render();}} break; }
    case 'delOpp':   { if(state.opponents.length<=1){toast('Garde au moins un adversaire');break;} snapshot(); state.opponents=state.opponents.filter(x=>x.id!==t.dataset.id); save(); render(); break; }
    case 'addOpp':     snapshot(); state.opponents.push(newOpp('Adversaire '+(state.opponents.length+1))); save(); render(); break;
    case 'resetAll':   resetAll(); break;
    case 'closeModal': closeModal(); break;
    case 'viewCard':   openCard(); break;
    case 'closeCard':  document.getElementById('cardview').classList.remove('show'); break;
  }
});

/* ============================================================
   MODALS
   ============================================================ */
const modal=document.getElementById('modal'), sheet=document.getElementById('sheet');
function openModal(html){ sheet.innerHTML='<div class="grip"></div>'+html; modal.classList.add('show'); }
function closeModal(){ modal.classList.remove('show'); }
modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });

function resetAll(){
  if(confirm('Tout réinitialiser ? (compteurs, créatures ajoutées, taxe, dégâts de commandant)\n\nNouvelle partie.')){
    history=[]; state=defaultState(); state.activeId=state.creatures[0].id; save(); render(); toast('Nouvelle partie');
  }
}

function openCreatureModal(cr){
  const isNew=!cr;
  openModal(`
    <h3>${isNew?'Nouvelle créature':'Modifier la créature'}</h3>
    <p>${isNew?'Pour suivre une autre créature à compteurs (jeton, cible de The Ozolith…).':'Skullbriar a une base de 1/1.'}</p>
    <div class="field"><label>Nom</label><input id="cr-name" type="text" value="${isNew?'':esc(cr.name)}" placeholder="Nom de la créature"></div>
    <div class="field"><label>Force / Endurance de base</label>
      <div class="pair"><input id="cr-p" type="number" inputmode="numeric" value="${isNew?1:cr.baseP}"><input id="cr-t" type="number" inputmode="numeric" value="${isNew?1:cr.baseT}"></div>
    </div>
    <div class="acts">
      <button class="cancel" data-act="closeModal">Annuler</button>
      ${(!isNew && !cr.cmd)?'<button class="danger" id="cr-del">Supprimer</button>':''}
      <button class="ok" id="cr-ok">${isNew?'Créer':'Enregistrer'}</button>
    </div>
  `);
  if(!isNew && !cr.cmd){
    document.getElementById('cr-del').onclick=()=>{
      if(state.creatures.length<=1){ toast('Au moins une créature requise'); return; }
      if(confirm('Supprimer « '+cr.name+' » ?')){
        snapshot(); state.creatures=state.creatures.filter(x=>x.id!==cr.id); state.activeId=state.creatures[0].id; save(); render(); closeModal();
      }
    };
  }
  document.getElementById('cr-ok').onclick=()=>{
    const name=(document.getElementById('cr-name').value||'').trim()||'Créature';
    const p=parseInt(document.getElementById('cr-p').value,10); const t=parseInt(document.getElementById('cr-t').value,10);
    snapshot();
    if(isNew){ const c=newCreature(name, isNaN(p)?1:p, isNaN(t)?1:t, false); state.creatures.push(c); state.activeId=c.id; }
    else { cr.name=name; cr.baseP=isNaN(p)?cr.baseP:p; cr.baseT=isNaN(t)?cr.baseT:t; }
    save(); render(); closeModal();
  };
}

let pickedEmoji='✨';
function openTypeModal(){
  pickedEmoji='✨';
  openModal(`
    <h3>Compteur personnalisé</h3>
    <p>Pour tout compteur non listé (Infect, Wither, Charge, Oil, Page…).</p>
    <div class="field"><label>Nom du compteur</label><input id="ty-name" type="text" placeholder="Ex : Infect" autocomplete="off"></div>
    <div class="field"><label>Icône</label>
      <div class="emojipick" id="ty-emoji">${EMOJI_CHOICES.map(e=>`<button data-e="${e}"${e===pickedEmoji?' class="sel"':''}>${e}</button>`).join('')}</div>
    </div>
    <div class="acts">
      <button class="cancel" data-act="closeModal">Annuler</button>
      <button class="ok" id="ty-ok">Ajouter</button>
    </div>
  `);
  document.getElementById('ty-emoji').addEventListener('click', e=>{
    const b=e.target.closest('button[data-e]'); if(!b) return;
    pickedEmoji=b.dataset.e;
    [...document.querySelectorAll('#ty-emoji button')].forEach(x=>x.classList.toggle('sel', x===b));
  });
  const inp=document.getElementById('ty-name'); setTimeout(()=>inp.focus(),120);
  const ok=()=>{
    const n=(inp.value||'').trim(); if(!n){ closeModal(); return; }
    snapshot();
    const id='cu_'+(state.seq++);
    state.customTypes.push({id, n, e:pickedEmoji});
    active().counts[id]=1;
    save(); render(); closeModal(); toast('Compteur « '+n+' » ajouté');
  };
  document.getElementById('ty-ok').onclick=ok;
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') ok(); });
}

function openCard(){
  const cv=document.getElementById('cardview');
  document.getElementById('cardviewImg').src = (CARD_FULL.indexOf('data:')===0) ? CARD_FULL : CARD_ART;
  cv.classList.add('show');
}
document.getElementById('cardview').addEventListener('click', e=>{ if(e.target.id==='cardview') document.getElementById('cardview').classList.remove('show'); });

/* ---------- utils ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),1600);
}

/* ---------- boot ---------- */
state = load();
if(!state.activeId) state.activeId = state.creatures[0].id;
if(typeof state.seq!=='number') state.seq=1;
save();   // persiste la dé-duplication des ids dès l'ouverture
render();
</script>
</body>
</html>
